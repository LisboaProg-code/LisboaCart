<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LisboaCart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">

    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    
</head>
<body>
    <header>

            <div class="menu">
                
                <div class="logo">
                    <img src="imgs/logo.png" alt="" class="logo">
                </div>
                <div class="menuContainer">
                    <i class="ri-heart-line"></i>
                    <i class="ri-shopping-cart-line"></i>
                    <i class="ri-menu-line menu" onclick="AbrirMenu()"></i>
                </div>

            </div>

    </header>
    
    <main>
        
        <section class="menu-hamburguer" id="menu">

            <div class="top-menu">

                <div class="search-bar">
                    <input type="text" name="search" id="search">
                    <a href="#"><i class="ri-search-line"></i> </a>
                </div>

            </div>

            <nav>

                <ul>

                    <li id="selected">

                        <a href="#"><i class="ri-layout-grid-line"></i> All departaments</a>

                    </li>

                    <li>

                        <a href="#">Home</a>

                    </li>

                    <li>

                        <a href="#">Dropdown Menu</a>

                    </li>

                    <li>

                        <a href="#">Mega Menu</a>

                    </li>

                    <li>

                        <a href="#">Dashboard</a>

                    </li>
                    
                </ul>
                
            </nav>

            <div class="bottom-menu">

                <p>
                    <i class="ri-user-line"></i>
                    <i class="ri-settings-2-line"></i>
                </p>
                
                <button> <i class="ri-map-pin-line"></i> Location</button>

            </div>

        </section>

    </main>

</body>
</html>
